<script>
/*
====================================================
GAS 연동 설정
====================================================
*/
const SCRIPT_URL = window.__ENV__?.SCRIPT_URL;
const PAGE_ENV = window.__ENV__?.TAG; // "DEV" or "LIVE"
/*
====================================================
주문 일정 모듈
VERSION: v1.4.4-sale-weekly-min
====================================================
*/

/*
모드 값
- "ALWAYS_OPEN"
- "WEEKLY"
- "ALWAYS_CLOSE"
*/
const SALE_MODE = "ALWAYS_OPEN";
// const SALE_MODE = "WEEKLY";
// const SALE_MODE = "ALWAYS_CLOSE";

/* WEEKLY 설정 */
const WEEKLY_OPEN_DAYS = [5, 6]; // 월(1), 월(1)
const WEEKLY_START_HOUR = 10;    // 오전 10시
const WEEKLY_END_HOUR = 22;      // 오후 16시

function isSaleOpen() {
  const now = new Date();

  if (SALE_MODE === "ALWAYS_OPEN") return true;
  if (SALE_MODE === "ALWAYS_CLOSE") return false;

  if (SALE_MODE === "WEEKLY") {
    const day = now.getDay();
    const hour = now.getHours();
    return (
      WEEKLY_OPEN_DAYS.includes(day) &&
      hour >= WEEKLY_START_HOUR &&
      hour < WEEKLY_END_HOUR
    );
  }

  return false;
}

const nicknameEl = document.getElementById("nickname");
const visitEl = document.getElementById("visit");
const orderBtn = document.getElementById("orderBtn");
const copyBtn = document.getElementById("copyBtn");
const orderText = document.getElementById("orderText");
const cashReceiptEl = document.getElementById("cashReceipt");

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function buildOrderMessageHTML(orderMessage) {
  let s = escapeHtml(orderMessage);

  // 총 결제금액: 금액만 강조
  s = s.replace(
    /(💰\s*총\s*결제금액:\s*)([0-9,]+원)/,
    `$1<span style="color:#2f80ed; font-weight:900;">$2</span>`
  );

  // 입금 계좌 3줄 강조(타이틀+농협+예금주)
  s = s.replace(
    /🏦\s*입금\s*계좌\n(농협[^\n]*)\n(예금주:[^\n]*)/,
    `<span style="color:#27ae60; font-weight:900;">🏦 입금 계좌</span>\n` +
    `<span style="color:#27ae60; font-weight:800;">$1</span>\n` +
    `<span style="color:#27ae60; font-weight:800;">$2</span>`
  );

  return s.replace(/\n/g, "<br>");
}
 
/* 수량 조절 */
document.querySelectorAll(".product").forEach(p => {
  const qtyEl = p.querySelector(".qty");
  p.querySelector(".plus").onclick = () => {
    qtyEl.innerText = Number(qtyEl.innerText) + 1;
    calc();
  };
  p.querySelector(".minus").onclick = () => {
    qtyEl.innerText = Math.max(0, Number(qtyEl.innerText) - 1);
    calc();
  };
});

function calc() {
  let saleSum = 0;      // 총 결제금액(판매가 합)
  let regularSum = 0;   // 상품금액합계(정상구매가 있으면 정상구매가, 없으면 판매가)
  let discountSum = 0;  // 공동구매가 할인(정상구매가 있는 품목만)

  document.querySelectorAll(".product").forEach(p => {
    const qty = Number(p.querySelector(".qty").innerText);
    const salePrice = Number(p.dataset.price);
    const hasRegular = (p.dataset.regularPrice !== undefined && p.dataset.regularPrice !== "");
    const regularPrice = hasRegular ? Number(p.dataset.regularPrice) : salePrice;

    // 합계는 수량이 있는 경우에만 반영
    if (qty > 0) {
      saleSum += salePrice * qty;
      regularSum += regularPrice * qty;

      if (hasRegular) {
        discountSum += (regularPrice - salePrice) * qty;
      }
    }

    // 카드 할인 문구: 정상구매가 있는 품목만 표시(0일 때도 1개 기준 표시)
    const saveEl = p.querySelector('[data-save-line="1"]');
    if (saveEl) {
      if (hasRegular) {
        const unitSave = (regularPrice - salePrice);
        const shownQty = Math.max(1, qty);
        saveEl.style.display = "inline-block";
        saveEl.innerText = "할인 " + (unitSave * shownQty).toLocaleString() + "원 ↓";
      } else {
        saveEl.style.display = "none";
        saveEl.innerText = "";
      }
    }

    // 카드별 상품합계(수량 0이면 숨김)
    let lineTotalEl = p.querySelector('[data-line-total="1"]');
    if (!lineTotalEl) {
      lineTotalEl = document.createElement("div");
      lineTotalEl.setAttribute("data-line-total", "1");
      lineTotalEl.style.marginTop = "6px";
      lineTotalEl.style.fontSize = "13px";
      lineTotalEl.style.fontWeight = "800";
      lineTotalEl.style.textAlign = "right";

      const body = p.querySelector(".product-body") || p;
      const qtyBox = body.querySelector(".qty-box");
      if (qtyBox) body.insertBefore(lineTotalEl, qtyBox);
      else body.appendChild(lineTotalEl);
    }

    if (qty > 0) {
      lineTotalEl.style.display = "block";
      lineTotalEl.innerHTML =
        '합계 <span class="money-blue">' +
        (salePrice * qty).toLocaleString() +
        '</span>원';
    } else {
      lineTotalEl.style.display = "none";
    }
  });

  // 총 결제금액
  const totalEl = document.getElementById("total");
